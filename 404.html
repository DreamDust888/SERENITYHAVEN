<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haven Not Found | Serenity Haven Resort</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  
  <style>
    body {
      background-image: linear-gradient(to bottom, rgba(17, 24, 39, 0.6), rgba(17, 24, 39, 0.9)), 
                        url('https://images.unsplash.com/photo-1501555088652-021faa106b9b?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      color: var(--color-warm-white);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .error-container {
      text-align: center;
      padding: var(--spacing-lg);
      background: rgba(17, 24, 39, 0.55);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
      max-width: 600px;
      margin: var(--spacing-md);
      box-shadow: var(--shadow-lg);
    }
    
    .error-code {
      font-family: var(--font-serif);
      font-size: 8rem;
      color: var(--color-gold);
      line-height: 1;
      margin-bottom: var(--spacing-xs);
      letter-spacing: 0.05em;
    }
    
    .error-quote {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.35rem;
      color: var(--color-sand);
      margin-bottom: var(--spacing-md);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <main class="error-container" aria-label="Error page content">
    <div class="error-code">404</div>
    <h1 style="color:var(--color-warm-white); font-family:var(--font-sans); font-size:1.15rem; font-weight:700; text-transform:uppercase; letter-spacing:0.2em; margin-bottom:var(--spacing-md);">Haven Not Found</h1>
    
    <p class="error-quote">"The road less traveled has its own wonders, but we can guide you back to comfort."</p>
    
    <p style="color:var(--color-sand-dark); margin-bottom:var(--spacing-lg); font-size:0.95rem;">The page you are looking for does not exist or has been relocated to another sanctuary.</p>
    
    <a href="index.html" class="btn btn-primary">Return to Serenity</a>
  </main>

</body>
</html>
